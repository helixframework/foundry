services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-cicd-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres_admin_password}
      POSTGRES_DB: ${POSTGRES_ADMIN_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d ${POSTGRES_ADMIN_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  homepage:
    image: nginx:1.27-alpine
    container_name: ${HOMEPAGE_CONTAINER_NAME:-cicd-homepage}
    restart: unless-stopped
    ports:
      - "${HOMEPAGE_PORT:-8080}:80"
    volumes:
      - ./homepage:/usr/share/nginx/html:ro

  gitea:
    image: gitea/gitea:1.22.6
    container_name: ${GITEA_CONTAINER_NAME:-gitea}
    restart: unless-stopped
    environment:
      USER_UID: ${PUID:-1000}
      USER_GID: ${PGID:-1000}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-http://localhost:3000/}
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: ${GITEA_DB_NAME:-gitea}
      GITEA__database__USER: ${GITEA_DB_USER:-gitea}
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD:-gitea_password}
      GITEA__database__SSL_MODE: disable
      GITEA__security__INSTALL_LOCK: true
      GITEA__service__DISABLE_REGISTRATION: false
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    volumes:
      - ./data/gitea:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/"]
      interval: 20s
      timeout: 10s
      retries: 10

  teamcity-server:
    image: jetbrains/teamcity-server:2025.03
    container_name: ${TEAMCITY_SERVER_CONTAINER_NAME:-teamcity-server}
    restart: unless-stopped
    depends_on:
      homepage:
        condition: service_started
      postgres:
        condition: service_healthy
      gitea:
        condition: service_healthy
    ports:
      - "${TEAMCITY_HTTP_PORT:-8111}:8111"
    volumes:
      - ./data/teamcity/server/data:/data/teamcity_server/datadir
      - ./data/teamcity/server/logs:/opt/teamcity/logs
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/8111"]
      interval: 20s
      timeout: 10s
      retries: 15

  teamcity-agent:
    image: jetbrains/teamcity-agent:2025.03
    container_name: ${TEAMCITY_AGENT_CONTAINER_NAME:-teamcity-agent-1}
    restart: unless-stopped
    depends_on:
      teamcity-server:
        condition: service_started
    environment:
      SERVER_URL: http://teamcity-server:8111
      AGENT_NAME: ${TEAMCITY_AGENT_NAME:-teamcity-agent-1}
      DOCKER_IN_DOCKER: start
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/teamcity/agent/conf:/data/teamcity_agent/conf
      - ./data/teamcity/agent/work:/opt/buildagent/work
      - ./data/teamcity/agent/temp:/opt/buildagent/temp
      - ./data/teamcity/agent/system:/opt/buildagent/system

networks:
  default:
    name: ${STACK_NETWORK_NAME:-selfhosted-cicd-net}
