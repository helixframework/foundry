<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Self-Hosted CI/CD</title>
    <style>
      :root {
        --bg: #0b1b2b;
        --bg-accent: #12324a;
        --card: #ffffff;
        --text: #0f1720;
        --muted: #415565;
        --gitea: #4ea23f;
        --teamcity: #0b7ed0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(55rem 55rem at 15% 10%, #1f5575 0%, transparent 60%),
          radial-gradient(50rem 50rem at 95% 90%, #204061 0%, transparent 60%),
          linear-gradient(160deg, var(--bg) 0%, var(--bg-accent) 100%);
        color: #eef4f9;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        width: min(920px, 100%);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.8rem, 3vw, 2.7rem);
      }

      p.lead {
        margin: 0 0 1.5rem;
        color: #d2e1ec;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1rem;
      }

      .card {
        background: var(--card);
        border-radius: 14px;
        padding: 1.1rem 1.2rem;
        color: var(--text);
        box-shadow: 0 12px 30px rgba(8, 20, 31, 0.28);
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .card h2 {
        margin: 0;
      }

      .meta {
        color: var(--muted);
        font-size: 0.95rem;
        margin: 0;
      }

      a.btn {
        text-decoration: none;
        color: #fff;
        font-weight: 600;
        border-radius: 10px;
        padding: 0.62rem 0.85rem;
        width: fit-content;
      }

      a.gitea {
        background: var(--gitea);
      }

      a.teamcity {
        background: var(--teamcity);
      }

      footer {
        margin-top: 1.1rem;
        color: #c9d9e5;
        font-size: 0.95rem;
      }

      code {
        color: #e8f5ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Self-Hosted CI/CD</h1>
      <p class="lead">Quick access to your local Gitea and TeamCity services.</p>

      <div class="grid">
        <section class="card">
          <h2>Gitea</h2>
          <p class="meta">Git hosting and repository management</p>
          <a class="btn gitea" id="gitea-link" href="#">Open Gitea</a>
          <p class="meta" id="gitea-url"></p>
        </section>

        <section class="card">
          <h2>TeamCity</h2>
          <p class="meta">Build server and pipeline orchestration</p>
          <a class="btn teamcity" id="teamcity-link" href="#">Open TeamCity</a>
          <p class="meta" id="teamcity-url"></p>
        </section>
      </div>

      <footer>
        First run: complete setup in Gitea, then connect TeamCity VCS roots to your Gitea repos.
      </footer>
    </main>

    <script>
      const host = window.location.hostname;
      const gitea = `http://${host}:3000`;
      const teamcity = `http://${host}:8111`;

      const giteaLink = document.getElementById('gitea-link');
      const teamcityLink = document.getElementById('teamcity-link');
      const giteaUrl = document.getElementById('gitea-url');
      const teamcityUrl = document.getElementById('teamcity-url');

      giteaLink.href = gitea;
      teamcityLink.href = teamcity;
      giteaUrl.textContent = gitea;
      teamcityUrl.textContent = teamcity;
    </script>
  </body>
</html>
