<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path class="a" d="M3 18L12 6l9 12" />
              <path class="b" d="M3 6h18" />
            </svg>
          </span>
          <span>Helix</span>
        </a>
        <div class="top-actions">
          <a class="top-link" href="/">Dashboard</a>
          <a class="top-link" href="/logs.html">Logs</a>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color mode">
            <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
            <span class="switch-label" id="theme-toggle-label">Dark</span>
          </button>
        </div>
      </header>

      <main class="logs-wrap">
        <div class="logs-top">
          <h1 class="logs-title">Service <span class="title-accent">Logs</span></h1>
        </div>

        <div class="logs-controls">
          <div class="logs-row logs-row-tabs">
            <div class="logs-tabs" role="tablist" aria-label="Service">
              <button class="btn secondary logs-tab is-active" type="button" role="tab" data-service-tab="gitea">Gitea</button>
              <button class="btn secondary logs-tab" type="button" role="tab" data-service-tab="teamcity">TeamCity</button>
              <button class="btn secondary logs-tab" type="button" role="tab" data-service-tab="nexus">Nexus</button>
            </div>
            <div class="logs-row-tabs-right">
              <div class="logs-row-quick-actions" id="logs-row-quick-actions" aria-label="Quick log actions">
                <button class="btn secondary logs-icon-btn" type="button" id="pause-btn-compact" aria-label="Pause stream" title="Pause stream">
                  <svg class="logs-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M9 6v12" />
                    <path d="M15 6v12" />
                  </svg>
                </button>
                <button class="btn secondary logs-icon-btn" type="button" id="reconnect-btn-compact" aria-label="Reconnect stream" title="Reconnect stream">
                  <svg class="logs-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                    <path d="M21 3v6h-6" />
                  </svg>
                </button>
                <button class="btn secondary logs-icon-btn" type="button" id="clear-btn-compact" aria-label="Clear output" title="Clear output">
                  <svg class="logs-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M6 6l12 12" />
                    <path d="M18 6L6 18" />
                  </svg>
                </button>
              </div>
              <button
                class="btn secondary logs-controls-toggle"
                type="button"
                id="logs-controls-toggle"
                aria-expanded="true"
                aria-label="Collapse controls"
                title="Collapse controls"
              >
                <span class="logs-controls-toggle-icon" aria-hidden="true">▾</span>
              </button>
            </div>
          </div>
          <div class="logs-controls-body" id="logs-controls-body">

          <div class="logs-row logs-row-filters">
            <div class="logs-field logs-field-search">
              <label class="logs-label" for="log-search">Search</label>
              <input id="log-search" class="logs-input" type="text" placeholder="Filter logs" />
            </div>
            <div class="logs-checks">
              <label class="logs-check"><input type="checkbox" id="regex-toggle" />Regex</label>
              <label class="logs-check"><input type="checkbox" id="case-toggle" />Case</label>
              <label class="logs-check"><input type="checkbox" id="matches-toggle" />Only matches</label>
              <label class="logs-check"><input type="checkbox" id="autoscroll-toggle" checked />Auto-scroll</label>
            </div>
          </div>

          <div class="logs-row logs-row-severity">
            <div class="logs-severity" role="group" aria-label="Severity filter">
              <button class="btn secondary logs-severity-chip is-active" type="button" data-severity-filter="all">
                All <span class="logs-severity-count" data-severity-count="all">0</span>
              </button>
              <button class="btn secondary logs-severity-chip" type="button" data-severity-filter="error">
                Error <span class="logs-severity-count" data-severity-count="error">0</span>
              </button>
              <button class="btn secondary logs-severity-chip" type="button" data-severity-filter="warn">
                Warn <span class="logs-severity-count" data-severity-count="warn">0</span>
              </button>
              <button class="btn secondary logs-severity-chip" type="button" data-severity-filter="info">
                Info <span class="logs-severity-count" data-severity-count="info">0</span>
              </button>
            </div>
          </div>

          <div class="logs-row logs-row-actions">
            <div class="logs-actions">
              <button class="btn secondary" type="button" id="pause-btn">Pause</button>
              <button class="btn secondary" type="button" id="reconnect-btn">Reconnect</button>
              <button class="btn secondary" type="button" id="clear-btn">Clear</button>
            </div>
            <span class="logs-status" id="stream-status">Status: <strong>Connecting...</strong></span>
          </div>
          </div>
        </div>

        <pre class="logs-output" id="log-output"></pre>
      </main>

      <footer class="footer">
        <span>&copy; 2026 Helix Framework</span>
        <a class="github-link" href="https://github.com/helixframework/foundry" aria-label="Foundry on GitHub" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 16 16" role="img" focusable="false" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52 0-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.53 7.53 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
          </svg>
        </a>
      </footer>
    </div>

    <script>
      (function () {
        var key = "foundry-theme";
        var root = document.documentElement;
        var toggle = document.getElementById("theme-toggle");
        var label = document.getElementById("theme-toggle-label");

        function applyTheme(theme) {
          root.setAttribute("data-theme", theme);
          if (toggle) {
            toggle.setAttribute("aria-checked", theme === "light" ? "true" : "false");
            toggle.setAttribute("data-theme", theme);
          }
          if (label) label.textContent = theme === "dark" ? "Dark" : "Light";
        }

        var stored = localStorage.getItem(key);
        var preferred = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
          ? "light"
          : "dark";
        applyTheme(stored || preferred);

        if (toggle) {
          toggle.addEventListener("click", function () {
            var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
            applyTheme(next);
            localStorage.setItem(key, next);
          });
        }

        var logsControlsBody = document.getElementById("logs-controls-body");
        var logsControlsToggle = document.getElementById("logs-controls-toggle");
        var serviceTabs = document.querySelectorAll("[data-service-tab]");
        var searchInput = document.getElementById("log-search");
        var regexToggle = document.getElementById("regex-toggle");
        var caseToggle = document.getElementById("case-toggle");
        var matchesToggle = document.getElementById("matches-toggle");
        var autoScrollToggle = document.getElementById("autoscroll-toggle");
        var severityButtons = document.querySelectorAll("[data-severity-filter]");
        var severityCountAll = document.querySelector('[data-severity-count="all"]');
        var severityCountError = document.querySelector('[data-severity-count="error"]');
        var severityCountWarn = document.querySelector('[data-severity-count="warn"]');
        var severityCountInfo = document.querySelector('[data-severity-count="info"]');
        var pauseBtn = document.getElementById("pause-btn");
        var pauseBtnCompact = document.getElementById("pause-btn-compact");
        var reconnectBtn = document.getElementById("reconnect-btn");
        var reconnectBtnCompact = document.getElementById("reconnect-btn-compact");
        var clearBtn = document.getElementById("clear-btn");
        var clearBtnCompact = document.getElementById("clear-btn-compact");
        var output = document.getElementById("log-output");
        var status = document.getElementById("stream-status");

        var stream = null;
        var reconnectTimer = null;
        var maxLines = 2000;
        var tailLines = 200;
        var logLines = [];
        var paused = false;
        var streamConnected = false;
        var filterRegex = null;
        var currentService = "gitea";
        var controlsCollapsedKey = "foundry-logs-controls-collapsed";
        var severityFilter = "all";

        function pauseCompactIconMarkup(isPaused) {
          if (isPaused) {
            return (
              '<svg class="logs-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">' +
              '<path class="logs-icon-fill" d="M9 7l8 5-8 5z" />' +
              "</svg>"
            );
          }
          return (
            '<svg class="logs-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">' +
            '<path d="M9 6v12" />' +
            '<path d="M15 6v12" />' +
            "</svg>"
          );
        }

        function setStatus(text, warning) {
          status.classList.toggle("warn", !!warning);
          status.classList.toggle("is-streaming", text === "Streaming" && !warning);
          status.classList.toggle("is-paused", text === "Paused");
          status.innerHTML = "Status: <strong>" + text + "</strong>";
        }

        function setControlsCollapsed(collapsed) {
          if (!logsControlsBody || !logsControlsToggle) return;
          var controlsRoot = logsControlsBody.closest(".logs-controls");
          if (controlsRoot) controlsRoot.classList.toggle("is-collapsed", collapsed);
          logsControlsBody.classList.toggle("is-collapsed", collapsed);
          logsControlsToggle.classList.toggle("is-collapsed", collapsed);
          logsControlsToggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
          logsControlsToggle.setAttribute("aria-label", collapsed ? "Expand controls" : "Collapse controls");
          logsControlsToggle.setAttribute("title", collapsed ? "Expand controls" : "Collapse controls");
          localStorage.setItem(controlsCollapsedKey, collapsed ? "1" : "0");
        }

        if (logsControlsToggle) {
          logsControlsToggle.addEventListener("click", function () {
            var collapsed = logsControlsBody && logsControlsBody.classList.contains("is-collapsed");
            setControlsCollapsed(!collapsed);
          });
        }

        function updatePausedUi() {
          if (pauseBtn) pauseBtn.textContent = paused ? "Resume" : "Pause";
          if (pauseBtnCompact) {
            pauseBtnCompact.setAttribute("aria-label", paused ? "Resume stream" : "Pause stream");
            pauseBtnCompact.setAttribute("title", paused ? "Resume stream" : "Pause stream");
            pauseBtnCompact.innerHTML = pauseCompactIconMarkup(paused);
          }
          if (paused) {
            setStatus("Paused", false);
          } else if (streamConnected) {
            setStatus("Streaming", false);
          }
        }

        function togglePause() {
          paused = !paused;
          updatePausedUi();
          if (!paused) {
            renderOutput();
          }
        }

        function reconnectStream() {
          connect();
        }

        function clearOutput() {
          logLines = [];
          renderOutput();
        }

        function getSelectedService() {
          return currentService;
        }

        function setActiveService(serviceId) {
          currentService = serviceId;
          serviceTabs.forEach(function (tab) {
            var active = tab.getAttribute("data-service-tab") === serviceId;
            tab.classList.toggle("is-active", active);
            tab.setAttribute("aria-selected", active ? "true" : "false");
          });
        }

        function setSelectedServiceFromQuery() {
          var params = new URLSearchParams(window.location.search);
          var requested = params.get("service");
          if (!requested) {
            setActiveService(currentService);
            return;
          }

          var hasTab = Array.prototype.some.call(serviceTabs, function (tab) {
            return tab.getAttribute("data-service-tab") === requested;
          });
          if (hasTab) {
            setActiveService(requested);
          } else {
            setActiveService(currentService);
          }
        }

        function updateQuery(serviceId) {
          var url = new URL(window.location.href);
          url.searchParams.set("service", serviceId);
          window.history.replaceState({}, "", url);
        }

        function currentAutoScroll() {
          return !!(autoScrollToggle && autoScrollToggle.checked);
        }

        function buildFilterRegex() {
          filterRegex = null;
          if (!searchInput || !regexToggle || !regexToggle.checked) return true;
          var pattern = searchInput.value || "";
          if (!pattern) return true;
          try {
            filterRegex = new RegExp(pattern, caseToggle && caseToggle.checked ? "" : "i");
            return true;
          } catch (err) {
            setStatus("Invalid regex", true);
            return false;
          }
        }

        function lineMatches(line) {
          var query = searchInput ? searchInput.value : "";
          if (!query) return true;
          if (regexToggle && regexToggle.checked) {
            return filterRegex ? filterRegex.test(line) : false;
          }

          if (caseToggle && caseToggle.checked) {
            return line.indexOf(query) >= 0;
          }
          return line.toLowerCase().indexOf(query.toLowerCase()) >= 0;
        }

        function getLineSeverity(line) {
          var lower = line.toLowerCase();
          if (
            lower.indexOf("error") >= 0 ||
            lower.indexOf("exception") >= 0 ||
            lower.indexOf("failed") >= 0 ||
            lower.indexOf("fatal") >= 0
          ) {
            return "error";
          }
          if (
            lower.indexOf("warn") >= 0 ||
            lower.indexOf("warning") >= 0 ||
            lower.indexOf("unauthorized") >= 0
          ) {
            return "warn";
          }
          return "info";
        }

        function passesSeverityFilter(line) {
          if (severityFilter === "all") return true;
          return getLineSeverity(line) === severityFilter;
        }

        function updateSeverityCounts() {
          var counts = { all: logLines.length, error: 0, warn: 0, info: 0 };
          logLines.forEach(function (line) {
            counts[getLineSeverity(line)] += 1;
          });

          if (severityCountAll) severityCountAll.textContent = String(counts.all);
          if (severityCountError) severityCountError.textContent = String(counts.error);
          if (severityCountWarn) severityCountWarn.textContent = String(counts.warn);
          if (severityCountInfo) severityCountInfo.textContent = String(counts.info);
        }

        function renderOutput() {
          if (!output) return;
          if (!buildFilterRegex()) {
            output.textContent = "";
            return;
          }

          var stickBottom = output.scrollTop + output.clientHeight >= output.scrollHeight - 16;
          var onlyMatches = matchesToggle && matchesToggle.checked;
          var visible = logLines.filter(function (line) {
            return passesSeverityFilter(line) && (!onlyMatches || lineMatches(line));
          });
          output.textContent = visible.join("\n");
          if (output.textContent.length) output.textContent += "\n";
          updateSeverityCounts();

          if (currentAutoScroll() && (stickBottom || !paused)) {
            output.scrollTop = output.scrollHeight;
          }
        }

        function appendLine(line) {
          logLines.push(line);
          if (logLines.length > maxLines) {
            logLines.splice(0, logLines.length - maxLines);
          }
          if (!paused) {
            renderOutput();
          }
        }

        function closeStream() {
          if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
          }

          if (stream) {
            stream.close();
            stream = null;
          }
        }

        function scheduleReconnect() {
          if (reconnectTimer) return;
          reconnectTimer = setTimeout(function () {
            reconnectTimer = null;
            connect();
          }, 2000);
        }

        function connect() {
          var serviceId = getSelectedService();
          updateQuery(serviceId);
          closeStream();
          setStatus("Connecting...", false);
          streamConnected = false;

          stream = new EventSource(
            "/api/services/" + encodeURIComponent(serviceId) + "/logs/stream?tail=" + tailLines
          );

          stream.addEventListener("open", function () {
            streamConnected = true;
            if (!paused) setStatus("Streaming", false);
          });

          stream.addEventListener("line", function (event) {
            appendLine(event.data || "");
          });

          stream.addEventListener("error", function () {
            streamConnected = false;
            setStatus("Disconnected - reconnecting", true);
            closeStream();
            scheduleReconnect();
          });
        }

        serviceTabs.forEach(function (tab) {
          tab.addEventListener("click", function () {
            var serviceId = tab.getAttribute("data-service-tab");
            if (!serviceId || serviceId === currentService) return;
            setActiveService(serviceId);
            logLines = [];
            renderOutput();
            connect();
          });
        });

        severityButtons.forEach(function (button) {
          button.addEventListener("click", function () {
            var next = button.getAttribute("data-severity-filter");
            if (!next) return;
            severityFilter = next;
            severityButtons.forEach(function (chip) {
              chip.classList.toggle("is-active", chip.getAttribute("data-severity-filter") === next);
            });
            renderOutput();
          });
        });

        if (searchInput) {
          searchInput.addEventListener("input", renderOutput);
        }
        if (regexToggle) {
          regexToggle.addEventListener("change", renderOutput);
        }
        if (caseToggle) {
          caseToggle.addEventListener("change", renderOutput);
        }
        if (matchesToggle) {
          matchesToggle.addEventListener("change", renderOutput);
        }
        if (autoScrollToggle) {
          autoScrollToggle.addEventListener("change", renderOutput);
        }

        if (pauseBtn) {
          pauseBtn.addEventListener("click", togglePause);
        }
        if (pauseBtnCompact) {
          pauseBtnCompact.addEventListener("click", togglePause);
        }

        reconnectBtn.addEventListener("click", reconnectStream);
        if (reconnectBtnCompact) {
          reconnectBtnCompact.addEventListener("click", reconnectStream);
        }

        clearBtn.addEventListener("click", clearOutput);
        if (clearBtnCompact) {
          clearBtnCompact.addEventListener("click", clearOutput);
        }

        window.addEventListener("beforeunload", closeStream);

        setSelectedServiceFromQuery();
        setControlsCollapsed(localStorage.getItem(controlsCollapsedKey) === "1");
        updatePausedUi();
        renderOutput();
        connect();
      })();
    </script>
  </body>
</html>
